trigger:
- main

# 1. Declare the external GitOps repository resource so Azure DevOps can check it out natively
resources:
  repositories:
  - repository: gitops_repo_resource
    type: github
    name: tejaravutla287/gitops-repo
    endpoint: github.com_tejaravutla287 # Replace this with the exact name of your GitHub Service Connection

variables:
  - group: 'New variable group 18-Jun'
  - name: acrName
    value: 'pocregistry3136'
  - name: imageRepository
    value: 'poc-app'
  - name: tag
    value: '$(Build.BuildId)'

stages:
- stage: BuildAndPush
  displayName: Build and Push Stage
  jobs:
  - job: Build
    displayName: Build Job
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    # 2. Explicitly checkout the application repository (app-repo) first
    - checkout: self
      displayName: 'Checkout Application Code'

    # 3. Build and Push Docker Image to ACR
    - task: Docker@2
      displayName: Build and Push to ACR
      inputs:
        containerRegistry: 'poc-acr-connection'
        repository: $(imageRepository)
        command: 'buildAndPush'
        Dockerfile: '**/Dockerfile'
        tags: |
          $(tag)
          latest

    # 4. Native, secure checkout of your secondary GitOps repository
    - checkout: gitops_repo_resource
      displayName: 'Checkout GitOps Repo'
      persistCredentials: true

    # 5. Direct local manifest update and push back to GitHub
    - script: |
        git config --global user.email "pipeline@azuredevops.com"
        git config --global user.name "Azure DevOps Pipeline"
        
        # When using multi-checkout, Azure DevOps places repositories into folders matching their names
        cd $(Build.SourcesDirectory)/gitops-repo/manifests
        
        # Update the image tag inside deployment.yaml dynamically
        sed -i "s|image: .*|image: $(acrName).azurecr.io/$(imageRepository):$(tag)|g" deployment.yaml
        
        # Stage, commit, and push directly back to the main branch
        git add deployment.yaml
        git commit -m "Automated image tag update to $(tag) [skip ci]"
        git push origin HEAD:main
      displayName: 'Update Kubernetes Manifests GitOps Repo'
